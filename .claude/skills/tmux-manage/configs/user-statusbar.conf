# Univers Ark CLI User Session Status Bar - 用户交互会话 (青色主题)
# 用于 univers-user tmux 会话

# 状态栏基础样式 - 青色主题 (#06b6d4)
set-option status-style 'bg=#0d1117,fg=#06b6d4'

# 左侧: 会话标识
set-option status-left-length 50
set-option status-left '#[fg=#06b6d4,bold] Ark CLI #[fg=#444444]│'

# 右侧: 服务状态
set-option status-right-length 120
set-option status-right '#[fg=#444444]│ #[fg=#8b949e]Workbench: #[fg=#3fb950]3003 #[fg=#444444]│ #[fg=#8b949e]Agents: #[fg=#a855f7]3004 #[fg=#444444]│ #[fg=#8b949e]%H:%M '

# 窗口样式
set-option window-status-format '#[fg=#8b949e] #I:#W '
set-option window-status-current-format '#[fg=#06b6d4,bold] #I:#W '

# 边框样式
set-option pane-border-style 'fg=#30363d'
set-option pane-active-border-style 'fg=#06b6d4'

# 消息样式
set-option message-style 'bg=#06b6d4,fg=#0d1117'
